apiVersion: apps/v1
kind: Deployment
metadata:
  name: f1-frontend
  labels:
    app.kubernetes.io/name: f1-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: f1-frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: f1-frontend
    spec:
      containers:
        - name: f1-frontend
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.service.port }}
          readinessProbe:
            httpGet:
              path: /healthz
              port: {{ .Values.service.port }}
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: {{ .Values.service.port }}
            periodSeconds: 15
          resources:
            requests:
              cpu: {{ .Values.resources.requests.cpu }}
              memory: {{ .Values.resources.requests.memory }}
            limits:
              cpu: {{ .Values.resources.limits.cpu }}
              memory: {{ .Values.resources.limits.memory }}
