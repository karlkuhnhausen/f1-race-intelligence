namespace: f1-race-intelligence

image:
  repository: ""
  tag: "latest"
  pullPolicy: IfNotPresent

service:
  port: 80

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

ingress:
  enabled: true
  className: nginx
  host: f1raceintel.westus3.cloudapp.azure.com
  tls: false
