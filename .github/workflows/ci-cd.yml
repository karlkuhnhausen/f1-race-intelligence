name: CI/CD Pipeline

on:
  push:
    branches:
      - master
      - main
      - "feature/**"
      - "bugfix/**"
  pull_request:
    branches:
      - master
      - main

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Go
        if: matrix.service == 'backend'
        uses: actions/setup-go@v4
        with:
          go-version: "1.22"
      
      - name: Set up Node
        if: matrix.service == 'frontend'
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      
      - name: Run Go linter
        if: matrix.service == 'backend'
        run: |
          cd backend
          go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest
          golangci-lint run
      
      - name: Run frontend lint
        if: matrix.service == 'frontend'
        run: |
          cd frontend
          npm ci
          npm run lint

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        service: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Go
        if: matrix.service == 'backend'
        uses: actions/setup-go@v4
        with:
          go-version: "1.22"
      
      - name: Set up Node
        if: matrix.service == 'frontend'
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      
      - name: Run Go tests
        if: matrix.service == 'backend'
        run: |
          cd backend
          go test -v -race -coverprofile=coverage.out ./...
      
      - name: Run frontend tests
        if: matrix.service == 'frontend'
        run: |
          cd frontend
          npm ci
          npm run test

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    strategy:
      matrix:
        service: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Go
        if: matrix.service == 'backend'
        uses: actions/setup-go@v4
        with:
          go-version: "1.22"
      
      - name: Set up Node
        if: matrix.service == 'frontend'
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      
      - name: Build Go binary
        if: matrix.service == 'backend'
        run: |
          cd backend
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o bin/api cmd/api/main.go
      
      - name: Build frontend
        if: matrix.service == 'frontend'
        run: |
          cd frontend
          npm ci
          npm run build

  push:
    name: Push Docker Images
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      
      - name: Build backend image
        run: |
          echo "Backend image build step (Dockerfile integration to be added)"
      
      - name: Build frontend image
        run: |
          echo "Frontend image build step (Dockerfile integration to be added)"

  deploy:
    name: Deploy to AKS
    runs-on: ubuntu-latest
    needs: push
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4
      
      - name: Configure kubectl
        run: |
          echo "kubectl configuration step (AKS credentials integration to be added)"
      
      - name: Deploy with Helm
        run: |
          echo "Helm deployment step (deploy/helm integration to be added)"
