name: CI/CD Pipeline

on:
  push:
    branches:
      - master
      - main
      - "feature/**"
      - "bugfix/**"
  pull_request:
    branches:
      - master
      - main

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Go
        if: matrix.service == 'backend'
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: backend/go.sum
      
      - name: Set up Node
        if: matrix.service == 'frontend'
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      
      - name: Run Go linter
        if: matrix.service == 'backend'
        run: |
          cd backend
          go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest
          golangci-lint run
      
      - name: Run frontend lint
        if: matrix.service == 'frontend'
        run: |
          cd frontend
          npm ci
          npm run lint

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        service: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Go
        if: matrix.service == 'backend'
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: backend/go.sum
      
      - name: Set up Node
        if: matrix.service == 'frontend'
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      
      - name: Run Go tests
        if: matrix.service == 'backend'
        run: |
          cd backend
          go test -v -race -coverprofile=coverage.out ./...
      
      - name: Run frontend tests
        if: matrix.service == 'frontend'
        run: |
          cd frontend
          npm ci
          npm run test

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    strategy:
      matrix:
        service: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Go
        if: matrix.service == 'backend'
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: backend/go.sum
      
      - name: Set up Node
        if: matrix.service == 'frontend'
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      
      - name: Build Go binary
        if: matrix.service == 'backend'
        run: |
          cd backend
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o bin/api cmd/api/main.go
      
      - name: Build frontend
        if: matrix.service == 'frontend'
        run: |
          cd frontend
          npm ci
          npm run build

  push:
    name: Push Docker Images
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    environment: production
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to ACR
        run: az acr login --name ${{ secrets.ACR_LOGIN_SERVER }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: backend
          push: true
          tags: |
            ${{ secrets.ACR_LOGIN_SERVER }}/f1-backend:${{ github.sha }}
            ${{ secrets.ACR_LOGIN_SERVER }}/f1-backend:latest

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: frontend
          push: true
          tags: |
            ${{ secrets.ACR_LOGIN_SERVER }}/f1-frontend:${{ github.sha }}
            ${{ secrets.ACR_LOGIN_SERVER }}/f1-frontend:latest

  deploy:
    name: Deploy to AKS
    runs-on: ubuntu-latest
    needs: push
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    environment: production
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Get AKS credentials
        run: |
          az aks get-credentials \
            --resource-group ${{ secrets.AKS_RESOURCE_GROUP }} \
            --name ${{ secrets.AKS_CLUSTER_NAME }} \
            --overwrite-existing

      - name: Wait for AKS cluster to be ready
        run: |
          echo "Waiting for AKS cluster to reach Succeeded provisioning state..."
          az aks wait \
            --resource-group ${{ secrets.AKS_RESOURCE_GROUP }} \
            --name ${{ secrets.AKS_CLUSTER_NAME }} \
            --updated \
            --timeout 300
          echo "AKS cluster is ready."

      - name: Get runner public IP
        id: runner-ip
        run: echo "ip=$(curl -fsSL https://api.ipify.org)" >> "$GITHUB_OUTPUT"

      - name: Add runner IP to AKS API server allowlist
        run: |
          RANGES="${{ steps.runner-ip.outputs.ip }}/32"
          if [[ -n "${{ secrets.ADMIN_IP_RANGES }}" ]]; then
            RANGES="${RANGES},${{ secrets.ADMIN_IP_RANGES }}"
          fi
          az aks update \
            --resource-group ${{ secrets.AKS_RESOURCE_GROUP }} \
            --name ${{ secrets.AKS_CLUSTER_NAME }} \
            --api-server-authorized-ip-ranges "${RANGES}"

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Deploy backend
        run: |
          helm upgrade --install f1-backend deploy/helm/backend \
            --namespace f1-race-intelligence \
            --create-namespace \
            --set image.repository=${{ secrets.ACR_LOGIN_SERVER }}/f1-backend \
            --set image.tag=${{ github.sha }} \
            --set workloadIdentity.clientId=${{ secrets.BACKEND_IDENTITY_CLIENT_ID }} \
            --set env.KEYVAULT_URI=${{ secrets.KEYVAULT_URI }} \
            --set env.COSMOS_ACCOUNT_ENDPOINT=${{ secrets.COSMOS_ENDPOINT }} \
            --wait --timeout 5m

      - name: Deploy frontend
        run: |
          helm upgrade --install f1-frontend deploy/helm/frontend \
            --namespace f1-race-intelligence \
            --create-namespace \
            --set image.repository=${{ secrets.ACR_LOGIN_SERVER }}/f1-frontend \
            --set image.tag=${{ github.sha }} \
            --wait --timeout 5m

      - name: Remove runner IP from AKS API server allowlist
        if: always()
        run: |
          az aks update \
            --resource-group ${{ secrets.AKS_RESOURCE_GROUP }} \
            --name ${{ secrets.AKS_CLUSTER_NAME }} \
            --api-server-authorized-ip-ranges "${{ secrets.ADMIN_IP_RANGES }}" \
            --no-wait
