name: AKS Scheduled Stop/Start

on:
  schedule:
    # Stop at 7pm Pacific (02:00 UTC next day during PDT)
    - cron: "0 2 * * *"
    # Start at 8am Pacific (15:00 UTC during PDT)
    - cron: "0 15 * * *"
  workflow_dispatch:
    inputs:
      action:
        description: "Action to perform"
        required: true
        type: choice
        options:
          - stop
          - start

permissions:
  id-token: write
  contents: read

jobs:
  aks-power:
    name: AKS Stop/Start
    runs-on: ubuntu-latest
    environment: aks-management
    steps:
      - name: Verify authorized actor
        if: github.event_name == 'workflow_dispatch' && github.actor != 'karlkuhnhausen'
        run: |
          echo "Unauthorized actor '${{ github.actor }}' attempted to trigger this workflow."
          exit 1

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Determine action
        id: action
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "action=${{ inputs.action }}" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.event.schedule }}" == "0 2 * * *" ]]; then
            echo "action=stop" >> "$GITHUB_OUTPUT"
          else
            echo "action=start" >> "$GITHUB_OUTPUT"
          fi

      - name: Check cluster power state
        id: state
        run: |
          POWER_STATE=$(az aks show \
            --resource-group ${{ secrets.AKS_RESOURCE_GROUP }} \
            --name ${{ secrets.AKS_CLUSTER_NAME }} \
            --query "powerState.code" -o tsv)
          echo "power_state=$POWER_STATE" >> "$GITHUB_OUTPUT"
          echo "Cluster is currently: $POWER_STATE"

      - name: Stop AKS cluster
        if: steps.action.outputs.action == 'stop' && steps.state.outputs.power_state == 'Running'
        run: |
          echo "Stopping AKS cluster ${{ secrets.AKS_CLUSTER_NAME }}..."
          az aks stop \
            --resource-group ${{ secrets.AKS_RESOURCE_GROUP }} \
            --name ${{ secrets.AKS_CLUSTER_NAME }} \
            --no-wait
          echo "Stop command issued (no-wait). Cluster will deallocate nodes."

      - name: Skip stop (already stopped)
        if: steps.action.outputs.action == 'stop' && steps.state.outputs.power_state != 'Running'
        run: echo "Cluster is already ${{ steps.state.outputs.power_state }} — skipping stop."

      - name: Start AKS cluster
        if: steps.action.outputs.action == 'start' && steps.state.outputs.power_state == 'Stopped'
        run: |
          echo "Starting AKS cluster ${{ secrets.AKS_CLUSTER_NAME }}..."
          az aks start \
            --resource-group ${{ secrets.AKS_RESOURCE_GROUP }} \
            --name ${{ secrets.AKS_CLUSTER_NAME }}
          echo "Cluster started and nodes ready."

      - name: Skip start (already running)
        if: steps.action.outputs.action == 'start' && steps.state.outputs.power_state != 'Stopped'
        run: echo "Cluster is already ${{ steps.state.outputs.power_state }} — skipping start."
